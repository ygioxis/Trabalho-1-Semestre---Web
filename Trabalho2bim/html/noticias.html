<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícias - FutNews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">⚽ FutNews</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="noticias.html">Notícias</a></li>
                    <li class="nav-item"><a class="nav-link" href="noticias-api.html">Ao Vivo 🔴</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin.html" style="display:none">Admin</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-white" id="nomeUsuario"></span>
                    <a href="perfil.html" class="btn btn-outline-light btn-sm" id="btnPerfil" style="display:none">Perfil</a>
                    <button class="btn btn-outline-light btn-sm" id="btnLogout" style="display:none" onclick="logout()">Sair</button>
                    <a href="login.html" class="btn btn-outline-light btn-sm" id="btnLogin">Entrar</a>
                    <button class="btn btn-outline-light btn-sm" id="btnTema">🌙 Tema Escuro</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">

            <div class="col-12 col-md-9">
                <h2 class="secao-titulo">📰 NOTÍCIAS</h2>


                <div class="input-group mb-4">
                    <input type="text" class="form-control" id="campoBusca" placeholder="Buscar notícia...">
                    <button class="btn btn-success" onclick="buscarNoticias()">🔍 Buscar</button>
                </div>

                <div class="row" id="lista-noticias">
                    <p class="text-muted">Nenhuma notícia cadastrada ainda.</p>
                </div>
            </div>


            <div class="col-12 col-md-3 mt-4 mt-md-0">
                <h5 class="secao-titulo" style="font-size:1rem;">🗂️ CATEGORIAS</h5>
                <ul class="list-group">
                    <li class="list-group-item cat-item ativo" data-cat="" onclick="filtrarCategoria('')">⚽ Todas</li>
                    <li class="list-group-item cat-item" data-cat="Brasileirão" onclick="filtrarCategoria('Brasileirão')">🇧🇷 Brasileirão</li>
                    <li class="list-group-item cat-item" data-cat="Champions League" onclick="filtrarCategoria('Champions League')">🏆 Champions League</li>
                    <li class="list-group-item cat-item" data-cat="Seleção" onclick="filtrarCategoria('Seleção')">🌍 Seleção</li>
                </ul>
            </div>

        </div>
    </div>

    <footer class="text-center py-3 mt-5 border-top">
        <p class="mb-0">© 2025 FutNews</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../script/tema.js"></script>
    <script src="../script/noticias.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - FutNews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-success navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">⚽ FutNews</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="noticias.html">Notícias</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link active" href="admin.html">Admin</a></li>
                </ul>
                <button class="btn btn-outline-light btn-sm" id="btnTema">🌙 Tema Escuro</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Painel Admin</h2>

        <!-- FORMULÁRIO -->
        <div class="card mt-3 p-4">
            <h5 id="titulo-form">Nova Notícia</h5>
            <input type="hidden" id="noticia-id">
            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" class="form-control" id="noticia-titulo">
            </div>
            <div class="mb-3">
                <label class="form-label">Categoria</label>
                <select class="form-select" id="noticia-categoria">
                    <option value="Brasileirão">Brasileirão</option>
                    <option value="Champions League">Champions League</option>
                    <option value="Seleção">Seleção</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Conteúdo</label>
                <textarea class="form-control" id="noticia-conteudo" rows="4"></textarea>
            </div>
            <div>
                <button class="btn btn-success" onclick="salvarNoticia()">Salvar</button>
                <button class="btn btn-secondary ms-2" onclick="limparForm()">Cancelar</button>
            </div>
        </div>

        <!-- LISTA -->
        <h4 class="mt-5">Notícias Cadastradas</h4>
        <div id="lista-admin" class="mt-3"></div>
    </div>

    <!-- MODAL EXCLUSÃO -->
    <div class="modal fade" id="modalExcluir" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar Exclusão</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Tem certeza que deseja excluir esta notícia?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="btnConfirmarExcluir">Excluir</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-3 mt-5 border-top">
        <p class="mb-0">© 2025 FutNews</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../script/tema.js"></script>
    <script src="../script/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - FutNews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        #toast-msg {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #198754;
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            z-index: 9999;
            transition: opacity 0.4s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">⚽ FutNews</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="noticias.html">Notícias</a></li>
                    <li class="nav-item"><a class="nav-link" href="noticias-api.html">Ao Vivo 🔴</a></li>
                    <li class="nav-item"><a class="nav-link active" href="admin.html">Admin</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-white" id="nomeUsuario"></span>
                    <button class="btn btn-outline-light btn-sm" id="btnLogout" style="display:none" onclick="logout()">Sair</button>
                    <button class="btn btn-outline-light btn-sm" id="btnTema">🌙 Tema Escuro</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="secao-titulo">⚙️ PAINEL ADMIN</h2>

        <div class="card mt-3 p-4">
            <h5 id="titulo-form">Nova Notícia</h5>
            <input type="hidden" id="noticia-id">
            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" class="form-control" id="noticia-titulo" placeholder="Título da notícia">
            </div>
            <div class="mb-3">
                <label class="form-label">Categoria</label>
                <select class="form-select" id="noticia-categoria">
                    <option value="Brasileirão">🇧🇷 Brasileirão</option>
                    <option value="Champions League">🏆 Champions League</option>
                    <option value="Seleção">🌍 Seleção</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">URL da Imagem <span class="text-muted fw-normal">(opcional)</span></label>
                <input type="text" class="form-control" id="noticia-imagem" placeholder="https://exemplo.com/imagem.jpg">
                <small class="text-muted">Se não informado, será usada uma imagem padrão da categoria.</small>
            </div>
            <div class="mb-3">
                <label class="form-label">Conteúdo</label>
                <textarea class="form-control" id="noticia-conteudo" rows="5" placeholder="Escreva o conteúdo completo da notícia..."></textarea>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-success" id="btn-salvar" onclick="salvarNoticia()">✅ Publicar</button>
                <button class="btn btn-secondary" onclick="limparForm()">✖ Cancelar</button>
            </div>
        </div>

        <!-- LISTA -->
        <h4 class="secao-titulo mt-5">📋 NOTÍCIAS CADASTRADAS</h4>
        <div id="lista-admin" class="mt-3"></div>
    </div>

    <div class="modal fade" id="modalExcluir" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">🗑️ Confirmar Exclusão</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Tem certeza que deseja excluir esta notícia? Esta ação não pode ser desfeita.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="btnConfirmarExcluir">Excluir</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-msg"></div>

    <footer class="text-center py-3 mt-5 border-top">
        <p class="mb-0">© 2025 FutNews</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../script/tema.js"></script>
    <script src="../script/admin.js"></script>
</body>
</html>

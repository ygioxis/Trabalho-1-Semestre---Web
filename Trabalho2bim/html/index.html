<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutNews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">⚽ FutNews</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="noticias.html">Notícias</a></li>
                    <li class="nav-item"><a class="nav-link" href="noticias-api.html">Ao Vivo 🔴</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin.html" style="display:none">Admin</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-white" id="nomeUsuario"></span>
                    <a href="perfil.html" class="btn btn-outline-light btn-sm" id="btnPerfil" style="display:none">Perfil</a>
                    <button class="btn btn-outline-light btn-sm" id="btnLogout" style="display:none" onclick="logout()">Sair</button>
                    <a href="login.html" class="btn btn-outline-light btn-sm" id="btnLogin">Entrar</a>
                    <button class="btn btn-outline-light btn-sm" id="btnTema">🌙 Tema Escuro</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- CARROSSEL -->
    <div id="carrossel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://placehold.co/1200x420/1a3a5c/white?text=Brasileirao+2025" class="d-block w-100" alt="Brasileirao">
            </div>
            <div class="carousel-item">
                <img src="https://placehold.co/1200x420/0d1b4f/white?text=Champions+League" class="d-block w-100" alt="Champions">
            </div>
            <div class="carousel-item">
                <img src="https://placehold.co/1200x420/1a5c2a/white?text=Selecao+Brasileira" class="d-block w-100" alt="Selecao">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carrossel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carrossel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <div style="background:#c0392b; padding: 8px 0; overflow:hidden;">
        <div style="display:flex; align-items:center;">
            <span style="background:#922b21; color:white; padding: 4px 16px; font-weight:700; font-size:0.85rem; white-space:nowrap; flex-shrink:0;">⚡ ÚLTIMAS</span>
            <div style="overflow:hidden; flex:1;">
                <div id="barra-noticias" style="white-space:nowrap; color:white; font-size:0.85rem; font-weight:500; animation: scroll 25s linear infinite; display:inline-block; padding-left:20px;"></div>
            </div>
        </div>
    </div>

    <div class="secao-noticias">
        <div class="container py-4">
            <h2 class="secao-titulo">⭐ DESTAQUE</h2>
            <div id="noticia-destaque"></div>
        </div>
    </div>

    <div class="secao-noticias" style="padding-top:0">
        <div class="container pb-4">
            <h2 class="secao-titulo">🇧🇷 BRASILEIRÃO</h2>
            <div class="row" id="noticias-brasileirao"></div>

            <h2 class="secao-titulo mt-4">🏆 CHAMPIONS LEAGUE</h2>
            <div class="row" id="noticias-champions"></div>

            <h2 class="secao-titulo mt-4">🌍 SELEÇÃO</h2>
            <div class="row" id="noticias-selecao"></div>
        </div>
    </div>

    <footer class="text-center py-3 border-top">
        <p class="mb-0">© 2025 FutNews</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../script/tema.js"></script>
    <script src="../script/noticias.js"></script>
</body>
</html>
